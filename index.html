<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
.video-wrapper {
  position: relative;
  width: 560px;
  height: 315px;
}

.video-wrapper iframe {
  display: block;
  width: 100%;
  height: 100%;
}

#text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 50px;
  color: white;
  z-index: 2;
  pointer-events: none;
  text-align: center;
  text-shadow: 2px 2px 8px black;
  width: 90%;
}

.controls {
  margin-top: 16px;
}

input {
  padding: 8px;
  font-size: 16px;
  width: 300px;
}

button {
  padding: 8px 12px;
  font-size: 16px;
  margin-left: 8px;
}
</style>
</head>
<body>

<div class="video-wrapper">
  <iframe
    src="https://www.youtube.com/embed/u7kdVe8q5zs?si=kV7KUlVRO0Jg_9oZ&autoplay=1&mute=1"
    title="YouTube video player"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen"
    referrerpolicy="strict-origin-when-cross-origin"
    allowfullscreen>
  </iframe>
  <div id="text">Overlay Text</div>
</div>

<div class="controls">
  <label for="overlayInput">Enter overlay text:</label>
  <input type="text" id="overlayInput" placeholder="Type a sentence here...">
  <button onclick="startWords()">Place words over text</button>
</div>

<script>
let intervalId;

function startWords() {
  clearInterval(intervalId);

  const input = document.getElementById("overlayInput").value.trim();
  const textEl = document.getElementById("text");

  const words = input.split(/\s+/);
  const chunks = [];

  for (let i = 0; i < words.length; i += 1) {
    chunks.push(words.slice(i, i + 1).join(" "));
  }

  let index = 0;
  textEl.textContent = chunks[index];

  intervalId = setInterval(() => {
    index++;
    if (index < chunks.length) {
      textEl.textContent = chunks[index];
    } else {
      clearInterval(intervalId);
    }
  }, 1000);
}
</script>

</body>
</html>
